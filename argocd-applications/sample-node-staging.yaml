# ArgoCD Application for staging (optional - Terraform creates this)
# Apply with: kubectl apply -f sample-node-staging.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sample-node-staging
  namespace: argocd
spec:
  project: sample-node-app
  source:
    repoURL: https://github.com/Fluder-Paradyne/sample-node-app-config.git
    targetRevision: main
    path: sample-node-app
    helm:
      valueFiles:
        - values-staging.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: sample-node-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: true
    syncOptions:
      - PruneLast=true
