{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "sample-node-app.fullname" . }}
  labels:
    {{- include "sample-node-app.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "sample-node-app.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
{{- end }}
